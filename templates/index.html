<!DOCTYPE html>
<html>
<head>
    <title>AI Resume Grader</title>
</head>
<body>

<h1>AI Resume Grader</h1>

<textarea id="resume" placeholder="Paste resume here" rows="10" cols="60"></textarea>
<br><br>

<textarea id="job" placeholder="Paste job description here" rows="10" cols="60"></textarea>
<br><br>

<button onclick="analyzeResume()">Analyze</button>

<p id="status"></p>

<pre id="output"></pre>

<script>
async function analyzeResume() {
    const resume = document.getElementById("resume").value;
    const job = document.getElementById("job").value;

    const status = document.getElementById("status");
    const output = document.getElementById("output");

    status.innerText = "Analyzing...";
    output.innerText = "";

    try {
        const response = await fetch("/analyze", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({
                resume: resume,
                job: job
            })
        });

        const data = await response.json();

        if (!response.ok) {
            status.innerText = data.error;
            return;
        }

        status.innerText = "Done. Remaining scans: " + data.remaining_scans;
        output.innerText = data.result;

    } catch (error) {
        status.innerText = "Something went wrong.";
    }
}
</script>

</body>
</html>
