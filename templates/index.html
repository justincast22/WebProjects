<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Resume Grader</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
<!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-DCM285EB0T"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-DCM285EB0T');
    </script>
</head>
<body>
    <div class="container">
        <h1>AI Resume Grader</h1>
        <p>Paste your resume and a job description to see how well they match.</p>

        <label for="resume">Resume</label>
        <textarea id="resume" placeholder="Paste your resume here..."></textarea>

        <label for="job">Job Description</label>
        <textarea id="job" placeholder="Paste the job description here..."></textarea>

        <button id="analyzeBtn">Analyze</button>

        <p id="status"></p>
        <pre id="output"></pre>
    </div>

    <script>
        const analyzeBtn = document.getElementById("analyzeBtn");
        const statusBox = document.getElementById("status");
        const outputBox = document.getElementById("output");

        async function analyzeResume() {
            const resume = document.getElementById("resume").value.trim();
            const job = document.getElementById("job").value.trim();

            statusBox.textContent = "";
            outputBox.textContent = "";

            if (!resume || !job) {
                statusBox.textContent = "Please fill in both boxes.";
                return;
            }

            statusBox.textContent = "Analyzing...";

            try {
                const response = await fetch("/analyze", {
                    method: "POST",
                    headers: {
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        resume: resume,
                        job: job
                    })
                });

                const data = await response.json();

                if (!response.ok) {
                    statusBox.textContent = data.error || "Something went wrong.";

                    if (response.status === 403) {
                        analyzeBtn.disabled = true;
                    }

                    return;
                }

                statusBox.textContent = `Done. Remaining scans: ${data.remaining_scans}`;
                outputBox.textContent = data.result;

                if (data.remaining_scans <= 0) {
                    analyzeBtn.disabled = true;
                }

            } catch (error) {
                statusBox.textContent = "Request failed. Check if Flask is running.";
            }
        }

        analyzeBtn.addEventListener("click", analyzeResume);
    </script>
</body>
</html>
